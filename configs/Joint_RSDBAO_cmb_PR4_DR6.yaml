      zfids:
      - 0.30
      - 0.51
      - 0.71
      - 0.92
      - 1.32
      - 1.49
      bao_sample_names:
      - BGS
      - LRG1
      - LRG2
      - LRG3
      - ELG
      - QSO
      Rsmooth:
      - 15
      - 15
      - 15
      - 15
      - 15
      - 30
      fid_dists: 
      - [117.3640762885204, 833.3078565389818]
      - [133.05386526145136,1337.692980282394]
      - [150.38072236661685,1761.8521557340339]
      - [170.78364036132075, 2154.866559272748]
      - [215.0091653164908, 2781.0509683317605]
      - [235.6651691492499, 3007.4665466663487]
      stop_at_error: True

