theory:
  classy:
    extra_args:
      output: "mPk"
      # non linear: 'none'             
      P_k_max_h/Mpc: 30
      N_ncdm: 1
      N_ur: 2.0328
      Omega_Lambda: 0
    stop_at_error: False
    input_params:
    - As
    - omega_cdm
    - w
    - wa
    - 100*theta_s
    - ns
    - omega_b
    - tau
    - Omega_k
    - m_ncdm
